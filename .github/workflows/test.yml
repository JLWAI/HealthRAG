name: Test Suite

on:
  push:
    branches:
      - main
      - 'feat/**'
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzbar0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/ \
            -m "unit" \
            --cov=src \
            --cov-report=xml \
            --cov-report=term \
            --cov-report=html \
            --junitxml=junit/test-results-${{ matrix.python-version }}.xml \
            --html=pytest-report-${{ matrix.python-version }}.html \
            --self-contained-html
        continue-on-error: false

      - name: Run integration tests
        run: |
          pytest tests/ \
            -m "integration and not slow" \
            --cov=src \
            --cov-append \
            --cov-report=xml \
            --cov-report=term \
            --junitxml=junit/test-results-integration-${{ matrix.python-version }}.xml
        continue-on-error: false

      - name: Check coverage threshold
        run: |
          coverage report --fail-under=75

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.10'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml
            pytest-report-${{ matrix.python-version }}.html
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.python-version }}
          path: junit/test-results-*.xml
          retention-days: 30

      - name: Test Summary
        uses: test-summary/action@v2
        if: always()
        with:
          paths: "junit/test-results-*.xml"

  slow-tests:
    name: Slow Tests (Python 3.10)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.10-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.10-
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzbar0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run slow tests
        run: |
          pytest tests/ \
            -m "slow" \
            --cov=src \
            --cov-report=xml \
            --cov-report=term \
            --junitxml=junit/test-results-slow.xml

      - name: Upload slow test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: slow-test-results
          path: junit/test-results-slow.xml
          retention-days: 30

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test, slow-tests]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## 📊 Test Results\n\n';

            // Check if coverage reports exist
            const coverageDir = 'coverage-report-3.10';
            if (fs.existsSync(`${coverageDir}/coverage.xml`)) {
              comment += '✅ Coverage report generated\n\n';
              comment += 'See workflow artifacts for detailed coverage report.\n';
            } else {
              comment += '⚠️ Coverage report not found\n';
            }

            comment += '\n---\n';
            comment += 'View full test results in the [Actions tab](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})';

            // Post comment
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
